name: Leaderboard du jour

on:
  schedule:
    - cron: "0 21 * * *"   # tous les jours ~23h Paris (été) — bilan des dernières 24h
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: clan-stats-leaderboard
  cancel-in-progress: false

jobs:
  leaderboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Post leaderboard
        env:
          WG_APP_ID: ${{ secrets.WG_APP_ID }}
          WG_CLAN_ID: ${{ secrets.WG_CLAN_ID }}
          STATS_WEBHOOK_URL: ${{ secrets.STATS_WEBHOOK_URL }}
        run: python main.py leaderboard
      - name: Persist daily snapshot
        run: |
          if [[ -n "$(git status --porcelain snapshot.json)" ]]; then
            git config user.name  "clan-stats-bot"
            git config user.email "bot@users.noreply.github.com"
            git add snapshot.json
            git commit -m "chore: daily stats snapshot [skip ci]"
            git push
          fi
